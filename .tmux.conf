# Colors from system scheme
# background: #0d0e12 | surface: #121318 | surfaceContainer: #181920
# primary: #bbc5ee | onSurface: #e5e4f0 | outline: #74757f
# surfaceBright: #2a2c34 | tertiary: #f5e1ff

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Status bar
set -g status-style "bg=#121318,fg=#aaaab5"
set -g status-left "#[bg=#bbc5ee,fg=#353f61,bold] #S #[bg=#121318] "
set -g status-right "#[fg=#aaaab5]%H:%M #[bg=#bbc5ee,fg=#353f61,bold] #h "
set -g status-left-length 30
set -g status-right-length 40

# Window tabs
set -g window-status-format "#[fg=#74757f] #I:#W "
set -g window-status-current-format "#[bg=#24252e,fg=#bbc5ee,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#464750"
set -g pane-active-border-style "fg=#bbc5ee"

# Message and command line
set -g message-style "bg=#181920,fg=#e5e4f0"
set -g message-command-style "bg=#181920,fg=#e5e4f0"

# Mode (copy mode highlight)
set -g mode-style "bg=#475174,fg=#dce2ff"

# Clock
set -g clock-mode-colour "#bbc5ee"
